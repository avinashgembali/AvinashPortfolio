<section id="home" class="relative h-screen min-h-[600px] overflow-hidden bg-black">

  <!-- Content -->
  <div class="relative z-10 h-full flex items-center">
    <div class="max-w-7xl mx-auto px-6 w-full">
      <div class="max-w-2xl animate-on-scroll visible">
        <span class="text-primary font-semibold text-lg tracking-widest uppercase mb-4 block">{{ activeSlide.greeting }}</span>
        <h1 class="text-5xl md:text-7xl font-bold text-white leading-tight mb-6">{{ activeSlide.name }}</h1>
        <p class="text-xl text-gray-300 mb-10 leading-relaxed">{{ activeSlide.subtitle }}</p>
        <div class="flex flex-wrap gap-4">
          <button (click)="scrollTo('contact')" class="btn-primary text-base">Hire Me</button>
          <button (click)="scrollTo('projects')" class="btn-outline text-base border-white text-white hover:bg-white hover:text-dark">My Works</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Scroll indicator -->
  <div class="absolute bottom-8 right-8 z-10 hidden md:flex flex-col items-center gap-2 text-white/50">
    <span class="text-xs tracking-widest uppercase rotate-90">Scroll</span>
    <div class="w-px h-16 bg-white/30 animate-bounce"></div>
  </div>
</section>
