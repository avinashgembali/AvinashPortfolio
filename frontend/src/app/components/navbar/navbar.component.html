<nav [class]="scrolled() ? 'fixed top-0 left-0 right-0 z-50 bg-dark/95 backdrop-blur-sm shadow-lg transition-all duration-300' : 'fixed top-0 left-0 right-0 z-50 bg-transparent transition-all duration-300'">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <!-- Logo -->
    <button (click)="scrollTo('home')" class="text-2xl font-bold text-white tracking-wider hover:text-primary transition-colors">
      Avinash<span class="text-primary">.</span>
    </button>

    <!-- Desktop Nav -->
    <ul class="hidden lg:flex items-center gap-8">
      @for (link of navLinks; track link.anchor) {
        <li>
          <button
            (click)="scrollTo(link.anchor)"
            class="text-gray-300 hover:text-primary font-medium text-sm uppercase tracking-wider transition-colors duration-200">
            {{ link.label }}
          </button>
        </li>
      }
    </ul>

    <!-- Hire Me CTA -->
    <button (click)="scrollTo('contact')" class="hidden lg:block btn-primary text-sm py-2 px-6">
      Hire Me
    </button>

    <!-- Mobile Hamburger -->
    <button (click)="toggleMenu()" class="lg:hidden text-white p-2">
      @if (menuOpen()) {
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      } @else {
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      }
    </button>
  </div>

  <!-- Mobile Menu -->
  @if (menuOpen()) {
    <div class="lg:hidden bg-dark/98 backdrop-blur-sm border-t border-gray-700">
      <ul class="flex flex-col py-4">
        @for (link of navLinks; track link.anchor) {
          <li>
            <button
              (click)="scrollTo(link.anchor)"
              class="w-full text-left px-6 py-3 text-gray-300 hover:text-primary hover:bg-white/5 transition-colors text-sm uppercase tracking-wider">
              {{ link.label }}
            </button>
          </li>
        }
        <li class="px-6 pt-3">
          <button (click)="scrollTo('contact')" class="btn-primary text-sm py-2 px-6 w-full text-center">Hire Me</button>
        </li>
      </ul>
    </div>
  }
</nav>
