<section id="domains" class="py-24 bg-white">
  <div class="max-w-7xl mx-auto px-6">
    <div class="text-center mb-16 animate-on-scroll">
      <span class="section-label">What I Do</span>
      <h2 class="section-title">My Domains</h2>
      <p class="section-subtitle">
        I offer a broad range of development and design services to help businesses
        build outstanding digital products.
      </p>
    </div>

    <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-8">
      @for (service of portfolio.services; track service.title; let i = $index) {
        <div
          class="animate-on-scroll group bg-gray-50 rounded-2xl p-8 hover:bg-primary hover:shadow-xl transition-all duration-300 cursor-default"
          [style.transition-delay]="(i * 0.1) + 's'">
          <div class="text-5xl mb-6 group-hover:scale-110 transition-transform duration-300">{{ service.icon }}</div>
          <h3 class="text-xl font-bold text-gray-900 group-hover:text-white mb-3 transition-colors">{{ service.title }}</h3>
          <p class="text-gray-600 group-hover:text-white/80 leading-relaxed transition-colors text-sm">{{ service.description }}</p>
        </div>
      }
    </div>
  </div>
</section>
