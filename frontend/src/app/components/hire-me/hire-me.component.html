<section class="relative py-24 overflow-hidden">
  <!-- Background -->
  <div class="absolute inset-0"
    style="background-image: url('assets/images/bg_1.jpg'); background-size: cover; background-position: center; background-attachment: fixed;">
    <div class="absolute inset-0 bg-dark/85"></div>
  </div>

  <div class="relative z-10 max-w-4xl mx-auto px-6 text-center">
    <span class="text-primary font-semibold uppercase tracking-widest text-sm mb-4 block">Available for Work</span>
    <h2 class="text-4xl md:text-5xl font-bold text-white mb-6 leading-tight">
      I'm Available for<br><span class="text-primary">Freelancing</span>
    </h2>
    <p class="text-gray-300 text-lg mb-10 leading-relaxed max-w-2xl mx-auto">
      Whether you need a web app built from scratch, a performance audit, or a long-term
      engineering partner — I'm open to exciting new challenges.
    </p>
    <button (click)="scrollTo('contact')" class="btn-primary text-base px-10 py-4">
      Get In Touch
    </button>
  </div>
</section>
